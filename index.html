<html lang="en">

<title>SkillsLab</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2e3245;
    --text: #f0f2ff;
    --muted: #8b90b0;
    --head-font: 'Barlow Condensed', sans-serif;
    --body-font: 'Barlow', sans-serif;

    --c1: #4f8ef7; /* blue  – variable openers */
    --c2: #34c98e; /* green – detail expansion */
    --c3: #f25c5c; /* red   – reduce wordiness */
    --c4: #f5a623; /* amber – active voice */
    --c5: #b98af7; /* purple – power verbs */
    --c6: #f76e9e; /* pink  – remove repetition */
    --c7: #4ecdc4; /* teal  – reconstruction */
    --c8: #a8e063; /* lime  – finish sentence */
    --c9: #ff8c69; /* coral – filter removal */
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body-font);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    background: #080a10;
    border-bottom: 2px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  nav h1 {
    font-family: var(--head-font);
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  nav h1 span { color: var(--muted); font-weight: 700; font-size: 1.1rem; margin-left: 12px; }
  .nav-btns { display: flex; gap: 10px; }
  .btn {
    font-family: var(--head-font);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 22px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-new { background: #34c98e; color: #06200f; }
  .btn-print { background: var(--border); color: var(--text); }

  /* ── TIMER ── */
  .timer-block {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
  }
  .timer-display {
    font-family: var(--head-font);
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--text);
    min-width: 80px;
    text-align: center;
    transition: color .2s;
  }
  .timer-display.urgent { color: #f25c5c; }
  @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
  .timer-display.flashing { animation: flash .6s ease-in-out infinite; }
  .timer-sep { color: var(--muted); font-size: .85rem; font-family: var(--head-font); letter-spacing:.03em; }
  .timer-mins-input {
    font-family: var(--head-font);
    font-size: 1.3rem;
    font-weight: 700;
    width: 44px;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 5px;
    padding: 3px 4px;
  }
  .timer-mins-input:focus { outline: none; border-color: #4f8ef7; }
  .btn-timer {
    font-family: var(--head-font);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-timer:hover { opacity: .85; }
  .btn-go    { background: #4f8ef7; color: #fff; }
  .btn-stop  { background: #f25c5c; color: #fff; }
  .btn-reset { background: var(--border); color: var(--text); }

  /* ── GRID ── */
  main {
    flex: 1;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    min-height: 0;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: 10px;
    border-left: 6px solid var(--accent);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .card-head {
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .card-num {
    font-family: var(--head-font);
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    min-width: 28px;
  }
  .card-title {
    font-family: var(--head-font);
    font-size: 1.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .card-body {
    flex: 1;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }

  .instruction {
    font-size: 1.3rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.3;
    flex-shrink: 0;
  }

  .content-text {
    font-size: 1.65rem;
    line-height: 1.45;
    color: var(--text);
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
  }

  /* highlight colours */
  .hl-red    { background: #f25c5c33; color: #f98080; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
  .hl-yellow { background: #f5a62333; color: #fbbf5a; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
  .hl-blue   { background: #4f8ef733; color: #93b8ff; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
  .hl-orange { background: #f5a62333; color: #fdba74; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
  .hl-pink   { background: #f76e9e33; color: #f9a8d4; padding: 1px 5px; border-radius: 4px; font-weight: 700; }

  /* task badges */
  .badge {
    display: inline-block;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    border-radius: 5px;
    padding: 5px 12px;
    font-size: 1.25rem;
    font-weight: 700;
    font-family: var(--head-font);
    letter-spacing: .03em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* vocab pills for finish-sentence */
  .vocab-pills { display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .vpill {
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 50%, transparent);
    color: var(--accent);
    padding: 5px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 1.4rem;
    font-family: var(--head-font);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* phrase pills for reconstruction */
  .phrase-pills { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; align-content: flex-start; overflow: hidden; }
  .ppill {
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 35%, transparent);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .ppill-num {
    color: var(--accent);
    font-weight: 900;
    font-family: var(--head-font);
    margin-right: 5px;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; color: black; }
    nav .nav-btns { display: none; }
    nav { background: white; border-bottom: 2px solid #ccc; }
    nav h1 { color: black; }
    nav h1 span { color: #555; }
    main { gap: 10px; padding: 10px; }
    .card { background: white; border-left: 5px solid var(--accent); border-top: 1px solid #ddd; border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; }
    .card-head { background: #f5f5f5; border-bottom: 1px solid #ddd; }
    .card-num, .card-title { color: var(--accent) !important; }
    .content-text { color: #111; }
    .instruction { color: #555; }
    .badge { background: #eee; color: #333; border-color: #ccc; }
    .hl-red    { background: #ffd6d6; color: #900; }
    .hl-yellow { background: #fff3cd; color: #7a4f00; }
    .hl-blue   { background: #d6e8ff; color: #003a8c; }
    .hl-orange { background: #ffe8cc; color: #7a3500; }
    .hl-pink   { background: #ffd6e8; color: #8c0044; }
    .ppill { background: #f0f0f0; border-color: #bbb; color: #111; }
    .vpill { background: #eee; color: #111; border-color: #bbb; }
  }
</style>
</head>

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    .replace(/<hl-blue>(.*?)<\/hl-blue>/g,  '<span class="hl-blue">$1</span>')
    .replace(/<hl-orange>(.*?)<\/hl-orange>/g,'<span class="hl-orange">$1</span>')
    .replace(/<hl-pink>(.*?)<\/hl-pink>/g,  '<span class="hl-pink">$1</span>');
}

// Week plan: for each of 20 weeks, one index per activity (0-based).
// Chosen to avoid iffy content and give variety across week types.
// Format: [opener, adjective, stopWords, passive, basicVerbs, repetition, scrambled, finish, filter]
const WEEK_PLANS = [
  [ 0,  0,  0,  0,  0,  0,  0,  0,  0], // Week 1
  [ 3,  2,  4,  6,  3,  3,  1,  1,  1], // Week 2
  [ 6,  4,  7, 13,  6,  6,  2,  2,  2], // Week 3
  [10,  6, 10, 16,  9,  9,  3,  3,  3], // Week 4
  [13,  8, 13,  2, 12, 12,  4,  4,  4], // Week 5
  [16, 10, 16,  5, 15, 15,  5,  5,  5], // Week 6
  [19, 12,  1,  8, 18, 18,  6,  6,  6], // Week 7
  [22, 14,  3, 11, 21, 21,  7,  7,  7], // Week 8
  [25, 16,  6, 14, 24, 24,  8,  8,  8], // Week 9
  [28, 18,  9, 17, 27, 27,  9,  9,  9], // Week 10
  [ 1, 20, 11, 19,  1,  1, 10, 10, 10], // Week 11
  [ 4, 22, 14, 21,  4,  4, 11, 11, 11], // Week 12
  [ 7, 24, 17, 23,  7,  7, 12, 12, 12], // Week 13
  [11, 26, 20, 25, 10, 10, 13, 13, 13], // Week 14
  [14, 27,  2, 27, 13, 13, 14, 14, 14], // Week 15
  [17,  1,  5,  1, 16, 16, 15, 15, 15], // Week 16
  [20,  3,  8,  3, 19, 19, 16, 16, 16], // Week 17
  [23,  5, 12,  7, 22, 22, 17, 17, 17], // Week 18
  [26,  9, 15, 10, 25, 20, 18, 18, 18], // Week 19
  [29, 11, 18, 12, 28, 23, 19, 19, 19], // Week 20
];

function weekIndex() {
  return parseInt(document.getElementById('week-select').value) - 1;
}

function generateWorksheet() {
  const grid = document.getElementById('grid');
  const w = weekIndex();
  const plan = WEEK_PLANS[w];
  const keys = ['openers','adjectives','stopWords','passive','basicVerbs','repetition','scrambled','finishTheSentence','filterWords'];
  grid.innerHTML = ACTIVITIES.map((act, i) => {
    const arr = data[keys[i]];
    const item = arr[plan[i] % arr.length];
    return `
      <div class="card" style="--accent:${act.accent}">
        <div class="card-head">
          <span class="card-title">${act.label}</span>
        </div>
        <div class="card-body">
          <p class="instruction">${act.instruction}</p>
          ${act.render(item)}
        </div>
      </div>`;
  }).join('');
}

window.onload = generateWorksheet;

// ── TIMER ──
let timerInterval = null;
let timerSeconds = 120;
let beepPlayed = false;

const display   = () => document.getElementById('timer-display');
const minsInput = () => document.getElementById('timer-mins');
const btnGo     = () => document.getElementById('btn-go');
const btnStop   = () => document.getElementById('btn-stop');

function timerFormat(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2,'0');
}

function timerRender() {
  const d = display();
  d.textContent = timerFormat(timerSeconds);
  if (timerSeconds <= 10 && timerSeconds > 0) {
    d.classList.add('urgent','flashing');
  } else {
    d.classList.remove('urgent','flashing');
  }
}

function timerStart() {
  if (timerInterval) return;
  // if at zero, reset first
  if (timerSeconds <= 0) timerReset();
  beepPlayed = false;
  btnGo().style.display  = 'none';
  btnStop().style.display = '';
  timerInterval = setInterval(() => {
    timerSeconds--;
    timerRender();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerDone();
    }
  }, 1000);
}

function timerStop() {
  clearInterval(timerInterval);
  timerInterval = null;
  btnGo().style.display  = '';
  btnStop().style.display = 'none';
  btnGo().textContent = '▶ Resume';
}

function timerReset() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = (parseInt(minsInput().value) || 2) * 60;
  beepPlayed = false;
  display().classList.remove('urgent','flashing');
  timerRender();
  btnGo().style.display  = '';
  btnStop().style.display = 'none';
  btnGo().textContent = '▶ Start';
}

function timerDone() {
  btnGo().style.display  = '';
  btnStop().style.display = 'none';
  btnGo().textContent = '▶ Start';
  display().classList.remove('flashing');
  display().classList.add('urgent');
  beep();
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.25, 0.5].forEach(offset => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.6, ctx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.2);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.3);
    });
  } catch(e) {}
}

// sync display when minutes input changes
document.addEventListener('DOMContentLoaded', () => {
  minsInput().addEventListener('change', () => {
    if (!timerInterval) timerReset();
  });
  timerReset();
});
</script>
